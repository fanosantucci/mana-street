<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>¡Gracias! — Mana Street</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Syne:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:  #0a0a0a;
      --white:  #f0ebe0;
      --accent: #1AAECD;
      --gold:   #E8D472;
    }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .check {
      font-size: 5rem;
      margin-bottom: 2rem;
      animation: pop 0.6s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
    }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    h1 {
      font-family: 'Anton', sans-serif;
      font-size: clamp(3rem, 10vw, 7rem);
      text-transform: uppercase;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 1rem;
    }
    h1 span { color: var(--accent); }
    p {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(240,235,224,0.45);
      max-width: 400px;
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }
    .btn-volver {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 1rem 2.5rem;
      font-family: 'Anton', sans-serif;
      font-size: 1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 100%, 12px 100%);
      transition: background 0.2s;
    }
    .btn-volver:hover { background: var(--gold); }
    .logo {
      position: fixed;
      top: 2rem; left: 50%;
      transform: translateX(-50%);
      font-family: 'Anton', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(240,235,224,0.3);
    }
  </style>
</head>
<body>
  <div class="logo">Mana Street</div>
  <div class="check">✅</div>
  <h1>¡GRACIAS POR<br>TU <span>COMPRA</span>!</h1>
  <p>Tu pago fue procesado con éxito.<br>En breve te contactamos por WhatsApp para coordinar el envío.</p>
  <a href="/" class="btn-volver">Volver al inicio</a>
</body>
</html>
